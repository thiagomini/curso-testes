info:
  name: criar-livro
  type: http
  seq: 2

http:
  method: POST
  url: '{{baseUrl}}/livros'
  body:
    type: json
    data: |-
      {
        "titulo": "A Sombra de Innsmouth",
        "paginas": 256,
        "autor_id": 1,
        "editora_id": 1
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: '201'

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
