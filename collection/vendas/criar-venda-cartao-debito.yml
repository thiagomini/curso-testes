info:
  name: criar-venda-cartao-debito
  type: http
  seq: 2

http:
  method: POST
  url: '{{baseUrl}}/vendas'
  body:
    type: json
    data: |-
      {
        "idLivro": 1,
        "valor": 100,
        "modoPagamento": "CARTAO_DEBITO"
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: '201'

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
