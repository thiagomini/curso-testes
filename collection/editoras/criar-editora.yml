info:
  name: criar-editora
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/editoras"
  body:
    type: json
    data: |-
      {
        "nome": "Companhia das Letras",
        "cidade": "São Paulo",
        "email": "contato@companhiadasletras.com.br"
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "201"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
